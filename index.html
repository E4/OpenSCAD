<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSCAD</title>
    <meta name="description" content="An interactive, premium OpenSCAD playground in WebAssembly. Edit models in real-time, view compilation logs, and download 3D models.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
    
    <!-- Load Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    
    <!-- Import Map for Three.js (r160) -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="workspace-container">
      <section class="controls-panel">
        <div class="controls-section">
          <div class="buttons-row">
            <button id="render-btn" class="render-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
              Render
            </button>
            <button id="stop-btn" class="stop-btn" style="display: none;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect></svg>
              Stop
            </button>
            <button id="download-btn" class="download-btn" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              STL
            </button>
            <button id="download-3mf-btn" class="download-btn" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              3MF
            </button>
          </div>
          <div class="options-row">
            <div class="style-select-container">
              <label for="material-select">Style</label>
               <select id="material-select" class="style-select">
                 <option value="solid">Solid</option>
                 <option value="normals" selected>Normals</option>
                 <option value="wireframe">Wireframe</option>
               </select>
            </div>
            <div class="checkbox-container">
              <input type="checkbox" id="helper-grid-toggle">
              <label for="helper-grid-toggle">Helper-Grid</label>
            </div>
            <div class="checkbox-container">
              <input type="checkbox" id="auto-render-toggle" checked>
              <label for="auto-render-toggle">Auto-Render</label>
            </div>
          </div>
        </div>

        <div class="viewport-panel">
          <div class="viewport-overlay-info">Orbit: Left Click | Zoom: Scroll | Pan: Right Click</div>
          <div id="orientation-gizmo"></div>
          <div id="viewport-container"></div>
          <div id="viewport-log-container" class="viewport-log-container"></div>
          <div class="viewport-status-badge">
            <div id="status-dot" class="status-indicator"></div>
            <span id="status-text">Ready</span>
          </div>
        </div>
      </section>

      <section class="editor-panel">
        <header class="panel-header">
          <span class="panel-title">Editor</span>
          <div class="file-controls">
            <div id="file-select-container" class="custom-select-container">
              <button id="file-select-trigger" class="custom-select-trigger">
                <span id="active-file-text">/DemoShape</span>
                <span class="chevron-arrow">▼</span>
              </button>
              <div id="file-select-popup" class="custom-select-popup hidden">
                <div id="file-tree" class="file-tree"></div>
              </div>
            </div>
            <button id="new-file-btn" class="terminal-btn">New</button>
            <button id="rename-file-btn" class="terminal-btn">Rename</button>
            <button id="delete-file-btn" class="terminal-btn">Delete</button>
          </div>
        </header>
        <div id="editor-container"></div>
      </section>
    </div>

    <script type="module" src="./index.js"></script>
  </body>
</html>
