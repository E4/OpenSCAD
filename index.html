<!doctype html>
<html>
  <head>
    <script type="module">

      import OpenSCAD from "./openscad.js";

      // OPTIONAL: add fonts to the FS
      import { addFonts } from "./openscad.fonts.js";

      // OPTIONAL: add MCAD library to the FS
      import { addMCAD } from "./openscad.mcad.js";

      const filename = "cube.stl";

      // Instantiate the application
      const instance = await OpenSCAD({
        noInitialRun: true,
        ENV: {
          FONTCONFIG_FILE: "/fonts/fonts.conf",
          FONTCONFIG_PATH: "/fonts"
        }
      });

      // Populate fonts in the virtual filesystem
      addFonts(instance);

      // Populate MCAD library in the virtual filesystem
      addMCAD(instance);

      // Create locale directory to avoid localization warning
      instance.FS.mkdir("/locale");

      // Write a file to the filesystem
      instance.FS.writeFile("/input.scad", `
module example001()
{
  function r_from_dia(d) = d / 2;

  module rotcy(rot, r, h) {
    rotate(90, rot)
      cylinder(r = r, h = h, center = true, $fn=10);
  }

  difference() {
    sphere(r = r_from_dia(size), $fn=20);
    rotcy([0, 0, 0], cy_r, cy_h);
    rotcy([1, 0, 0], cy_r, cy_h);
    rotcy([0, 1, 0], cy_r, cy_h);
  }

  size = 50;
  hole = 25;

  cy_r = r_from_dia(hole);
  cy_h = r_from_dia(size * 2.5);
}

echo(version=version());

example001();
`); // OpenSCAD script

      // Run like a command-line program with arguments
      instance.callMain(["/input.scad", "--backend=Manifold", "-o", filename]); // manifold is faster at rendering

      // Read the output 3D-model into a JS byte-array
      const output = instance.FS.readFile("/"+filename);

      // Generate a link to output 3D-model and download the output STL file
      const link = document.createElement("a");
      link.href = URL.createObjectURL(new Blob([output], { type: "application/octet-stream" }), null);
      link.download = filename;
      document.body.append(link);
      //link.click();
      link.remove();
    </script>
  </head>
</html>
